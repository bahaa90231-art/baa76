<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <title>ByteAcademy | أساسيات الحاسوب - كورس احترافي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(145deg, #eef2ff 0%, #e0e7ff 100%);
            color: #0f172a;
            transition: all 0.3s ease;
            min-height: 100vh;
        }

        body.dark {
            background: linear-gradient(145deg, #0f172a 0%, #020617 100%);
            color: #e2e8f0;
        }

        /* Glass Navbar - محسّن للجوال */
        .glass-nav {
            position: sticky;
            top: 0;
            z-index: 1000;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid rgba(255,255,255,0.3);
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
        }
        body.dark .glass-nav {
            background: rgba(15, 23, 42, 0.9);
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .nav-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0.8rem 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 1.3rem;
            font-weight: 800;
            background: linear-gradient(135deg, #2563eb, #7c3aed, #06b6d4);
            background-size: 200% auto;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            animation: shimmer 3s infinite;
        }
        @keyframes shimmer {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .logo i {
            background: none;
            color: #3b82f6;
            font-size: 1.5rem;
        }
        .stats-bar {
            display: flex;
            gap: 8px;
            align-items: center;
            background: rgba(255,255,255,0.3);
            padding: 0.3rem 0.8rem;
            border-radius: 40px;
            font-size: 0.8rem;
        }
        body.dark .stats-bar {
            background: rgba(0,0,0,0.3);
        }
        .progress-bar-mini {
            width: 50px;
            height: 4px;
            background: #cbd5e1;
            border-radius: 10px;
            overflow: hidden;
        }
        .progress-fill-mini {
            height: 100%;
            background: #3b82f6;
            width: 0%;
            transition: width 0.3s;
        }
        .theme-toggle {
            background: rgba(255,255,255,0.4);
            border: none;
            padding: 6px 12px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.2s;
            display: flex;
            gap: 5px;
            align-items: center;
            font-size: 0.8rem;
        }
        body.dark .theme-toggle {
            background: #334155;
            color: #facc15;
        }

        /* Main layout - مرن للجوال */
        .platform {
            max-width: 1400px;
            margin: 1rem auto;
            padding: 0 1rem;
            display: flex;
            gap: 1.5rem;
            position: relative;
        }

        /* زر القائمة الجانبية للجوال */
        .mobile-menu-btn {
            display: none;
            position: fixed;
            bottom: 20px;
            left: 20px;
            z-index: 999;
            background: linear-gradient(135deg, #3b82f6, #7c3aed);
            border: none;
            color: white;
            width: 55px;
            height: 55px;
            border-radius: 30px;
            font-size: 1.5rem;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(59,130,246,0.4);
            transition: transform 0.2s;
        }
        .mobile-menu-btn:active {
            transform: scale(0.95);
        }

        /* الشريط الجانبي - يظهر كقائمة منسدلة في الجوال */
        .lessons-sidebar {
            flex: 1.2;
            min-width: 270px;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            border-radius: 1.5rem;
            padding: 1.2rem;
            height: fit-content;
            position: sticky;
            top: 85px;
            border: 1px solid rgba(255,255,255,0.5);
            transition: all 0.3s;
        }
        body.dark .lessons-sidebar {
            background: rgba(30, 41, 59, 0.9);
            border: 1px solid rgba(255,255,255,0.1);
        }
        .lessons-sidebar h3 {
            font-size: 1.3rem;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .lesson-btn {
            width: 100%;
            text-align: right;
            padding: 0.9rem 0.8rem;
            margin: 0.5rem 0;
            border: none;
            background: rgba(248,250,252,0.8);
            border-radius: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 10px;
            font-family: 'Cairo';
            font-size: 0.9rem;
        }
        body.dark .lesson-btn {
            background: rgba(15, 23, 42, 0.8);
            color: #cbd5e6;
        }
        .lesson-btn i { font-size: 1.1rem; color: #3b82f6; }
        .lesson-btn.active {
            background: linear-gradient(95deg, #3b82f6, #7c3aed);
            color: white;
            transform: translateX(-5px);
            box-shadow: 0 8px 16px -8px rgba(59,130,246,0.4);
        }
        .lesson-btn.active i { color: white; }

        /* المحتوى الرئيسي */
        .content-card {
            flex: 3;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(12px);
            border-radius: 1.5rem;
            padding: 1.5rem;
            border: 1px solid rgba(255,255,255,0.6);
            transition: all 0.3s;
            animation: fadeSlideUp 0.3s ease-out;
        }
        @keyframes fadeSlideUp {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
        body.dark .content-card {
            background: rgba(30, 41, 59, 0.85);
            border: 1px solid rgba(255,255,255,0.05);
        }
        .lesson-header {
            border-bottom: 2px solid rgba(59,130,246,0.3);
            padding-bottom: 0.8rem;
            margin-bottom: 1.2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }
        .lesson-title {
            font-size: 1.5rem;
            font-weight: 800;
            background: linear-gradient(125deg, #1e293b, #3b82f6);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        body.dark .lesson-title {
            background: linear-gradient(125deg, #facc15, #38bdf8);
            -webkit-background-clip: text;
        }
        .badge-lesson {
            background: linear-gradient(135deg, #3b82f6, #7c3aed);
            padding: 0.2rem 1rem;
            border-radius: 50px;
            font-weight: 600;
            color: white;
            font-size: 0.75rem;
        }
        .lesson-content {
            font-size: 1rem;
            line-height: 1.7;
        }
        .lesson-content p {
            margin-bottom: 0.8rem;
        }
        .lesson-content h3 {
            margin: 1rem 0 0.5rem 0;
            font-size: 1.2rem;
        }
        .spec-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 0.8rem;
            margin: 1rem 0;
        }
        .spec-card {
            background: rgba(241,245,249,0.7);
            padding: 0.9rem;
            border-radius: 1rem;
            border-right: 3px solid #3b82f6;
            font-size: 0.9rem;
        }
        body.dark .spec-card {
            background: rgba(15,23,42,0.6);
        }
        .highlight {
            background: #fef9c3;
            padding: 0.5rem 0.8rem;
            border-radius: 14px;
            font-weight: bold;
            margin: 0.8rem 0;
            font-size: 0.9rem;
        }
        body.dark .highlight {
            background: #334155;
            color: #fde047;
        }
        .nav-buttons {
            display: flex;
            justify-content: space-between;
            margin-top: 2rem;
            gap: 1rem;
        }
        .nav-btn {
            background: rgba(226,232,240,0.8);
            border: none;
            padding: 0.7rem 1.2rem;
            border-radius: 50px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.2s;
            font-family: 'Cairo';
            font-size: 0.9rem;
            flex: 1;
            text-align: center;
        }
        .nav-btn-primary {
            background: linear-gradient(95deg, #3b82f6, #7c3aed);
            color: white;
            box-shadow: 0 4px 12px rgba(59,130,246,0.3);
        }
        .nav-btn:active {
            transform: scale(0.97);
        }
        .shortcut-hint {
            font-size: 0.65rem;
            opacity: 0.6;
            margin-top: 12px;
            text-align: center;
        }
        footer {
            text-align: center;
            padding: 1.5rem;
            font-size: 0.75rem;
            color: #64748b;
        }

        /* استعلامات الوسائط للجوال */
        @media (max-width: 768px) {
            .nav-container {
                padding: 0.6rem 1rem;
            }
            .logo {
                font-size: 1.1rem;
            }
            .stats-bar {
                font-size: 0.7rem;
                padding: 0.2rem 0.6rem;
            }
            .progress-bar-mini {
                width: 40px;
            }
            .platform {
                padding: 0 0.8rem;
                margin: 0.8rem auto;
            }
            .content-card {
                padding: 1.2rem;
            }
            .lesson-title {
                font-size: 1.3rem;
            }
            .badge-lesson {
                font-size: 0.7rem;
                padding: 0.2rem 0.8rem;
            }
            .lesson-content {
                font-size: 0.95rem;
            }
            .spec-grid {
                grid-template-columns: 1fr;
            }
            .nav-btn {
                padding: 0.6rem 1rem;
                font-size: 0.85rem;
            }
            .mobile-menu-btn {
                display: flex;
                align-items: center;
                justify-content: center;
            }
            .lessons-sidebar {
                position: fixed;
                top: 0;
                right: -280px;
                height: 100vh;
                width: 280px;
                z-index: 1050;
                transition: right 0.3s ease;
                border-radius: 0;
                padding-top: 70px;
                overflow-y: auto;
                background: rgba(255, 255, 255, 0.98);
                backdrop-filter: blur(20px);
            }
            body.dark .lessons-sidebar {
                background: rgba(15, 23, 42, 0.98);
            }
            .lessons-sidebar.open {
                right: 0;
                box-shadow: -5px 0 30px rgba(0,0,0,0.3);
            }
            .overlay {
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background: rgba(0,0,0,0.5);
                z-index: 1040;
                display: none;
            }
            .overlay.active {
                display: block;
            }
        }

        @media (max-width: 480px) {
            .nav-container {
                flex-direction: row;
                justify-content: space-between;
            }
            .stats-bar span:not(.progress-bar-mini) {
                display: inline;
            }
            .theme-toggle span {
                display: none;
            }
            .theme-toggle {
                padding: 6px 10px;
            }
            .lesson-header {
                flex-direction: column;
                align-items: flex-start;
            }
        }
    </style>
</head>
<body>

<div class="glass-nav">
    <div class="nav-container">
        <div class="logo">
            <i class="fas fa-brain"></i>
            <span>Byte<span style="color:#7c3aed">Academy</span></span>
        </div>
        <div style="display: flex; align-items: center; gap: 10px;">
            <div class="stats-bar">
                <i class="fas fa-chalkboard-user"></i>
                <span id="completedCounter">0</span>/<span id="totalLessons">7</span>
                <div class="progress-bar-mini">
                    <div class="progress-fill-mini" id="miniProgress"></div>
                </div>
            </div>
            <button class="theme-toggle" id="darkModeBtn">
                <i class="fas fa-moon"></i> <span>داكن</span>
            </button>
        </div>
    </div>
</div>

<button class="mobile-menu-btn" id="mobileMenuToggle"><i class="fas fa-bars"></i></button>
<div class="overlay" id="overlay"></div>

<div class="platform">
    <div class="lessons-sidebar" id="sidebar">
        <h3><i class="fas fa-book-open"></i> الدروس</h3>
        <div id="lessonsList"></div>
    </div>
    <div class="content-card" id="mainContent">
        <div class="lesson-header">
            <div class="lesson-title" id="dynamicTitle"></div>
            <div class="badge-lesson" id="dynamicBadge"></div>
        </div>
        <div class="lesson-content" id="dynamicContent"></div>
        <div class="nav-buttons">
            <button id="prevBtn" class="nav-btn"><i class="fas fa-arrow-right"></i> السابق</button>
            <button id="nextBtn" class="nav-btn nav-btn-primary">التالي <i class="fas fa-arrow-left"></i></button>
        </div>
        <div class="shortcut-hint"><i class="fas fa-keyboard"></i> اضغط ← → للتنقل</div>
    </div>
</div>
<footer>
    <i class="fas fa-laptop-code"></i> كورس أساسيات الحاسوب — تجربة متجاوبة بالكامل
</footer>

<script>
    // المحتوى الأصلي كما هو من ملف PDF
    const lessons = [
        { id: 1, title: "ما هو الحاسوب؟", badge: "المقدمة", content: `<p><strong>الحاسوب</strong> هو جهاز إلكتروني رقمي مصمم لاستقبال البيانات ومعالجتها وتخزينها وإخراجها بسرعة فائقة الدقة. إنه أداة متعددة الاستخدامات تعمل وفق مجموعة من التعليمات المبرمجة مسبقاً تُعرف بالبرامج، وتمكن المستخدم من تنفيذ مهام لا حصر لها بكفاءة عالية.</p><h3>🔄 معالجة البيانات</h3><ul><li><strong>استقبال البيانات:</strong> يستقبل الحاسوب البيانات من المستخدم عبر وحدات الإدخال المختلفة كلوحة المفاتيح والفأرة والميكروفون والماسح الضوئي.</li><li><strong>معالجة البيانات:</strong> تتولى وحدة المعالجة المركزية (CPU) تحليل البيانات المدخلة وتحويلها إلى نتائج مفيدة.</li><li><strong>تخزين البيانات:</strong> يحتفظ الحاسوب بالبيانات إما مؤقتاً في RAM أو بشكل دائم على وحدات التخزين.</li><li><strong>إخراج النتائج:</strong> يعرض الحاسوب النتائج عبر وحدات الإخراج كالشاشة والطابعة.</li></ul><p>لقد شهد الحاسوب تطوراً هائلاً منذ اختراعه؛ فقد بدأ في الأربعينيات كآلات ضخمة تملأ غرفاً، وصولاً إلى الهواتف الذكية التي نحملها اليوم.</p>` },
        { id: 2, title: "المكونات المادية (Hardware)", badge: "الهيكل العظمي", content: `<p>المكونات المادية هي كل ما يمكن لمسه ورؤيته في الحاسوب. تتقسم إلى فئات رئيسية:</p><div class="spec-grid"><div class="spec-card"><strong>🖥️ اللوحة الأم</strong><br>تربط جميع المكونات وتتيح التواصل بينها.</div><div class="spec-card"><strong>💾 وحدات التخزين</strong><br>HDD/SSD لحفظ البيانات بشكل دائم.</div><div class="spec-card"><strong>🧠 الذاكرة العشوائية RAM</strong><br>ذاكرة مؤقتة وسريعة تُمحى عند الإطفاء.</div><div class="spec-card"><strong>⚙️ وحدة المعالجة المركزية CPU</strong><br>عقل الحاسوب ينفذ الأوامر والعمليات.</div></div><h3>⌨️ وحدات الإدخال والإخراج</h3><p><strong>الإدخال:</strong> لوحة مفاتيح، فأرة، ماسح ضوئي، ميكروفون، كاميرا.<br><strong>الإخراج:</strong> شاشة، طابعة، سماعات، جهاز عرض.</p>` },
        { id: 3, title: "تفصيل المكونات", badge: "CPU, RAM, GPU", content: `<h3>⚙️ وحدة المعالجة المركزية (CPU)</h3><p>تقاس بالجيجاهرتز (GHz) وعدد الأنوية (Cores). المعالجات الحديثة تحتوي على 16 نواة أو أكثر.</p><h3>🧠 الذاكرة العشوائية (RAM)</h3><p>تقاس بالجيجابايت (GB)، 8GB للاستخدام العادي، 16GB للمهام الاحترافية.</p><h3>🎮 بطاقة الرسوميات (GPU)</h3><p>متخصصة في معالجة البيانات المرئية، ضرورية للألعاب والتصميم والذكاء الاصطناعي.</p><div class='highlight'><strong>HDD vs SSD:</strong> SSD أسرع بكثير (3500 MB/s)، صامت ومتين. HDD سعة أكبر بسعر أقل.</div>` },
        { id: 4, title: "المكونات البرمجية", badge: "Software", content: `<p>البرمجيات هي الروح التي تمنح الحاسوب حياته. تنقسم إلى:</p><ul><li><strong>نظام التشغيل:</strong> يدير موارد الحاسوب. أمثلة: Windows، macOS، Linux، Android، iOS.</li><li><strong>برامج التطبيقات:</strong> مهام محددة مثل Word، Excel، Chrome، Photoshop.</li><li><strong>برامج المساعدة:</strong> أدوات صيانة مثل مكافحة الفيروسات وWinRAR.</li></ul><p>نظام التشغيل هو الوسيط بين المستخدم والمكونات المادية.</p>` },
        { id: 5, title: "أنواع الحواسيب", badge: "تنوع الاحتياجات", content: `<div class="spec-grid"><div class="spec-card"><strong>🖥️ مكتبي</strong><br>أداء عالٍ، قابل للترقية</div><div class="spec-card"><strong>💻 محمول</strong><br>مرونة وتنقل</div><div class="spec-card"><strong>📡 خادم Server</strong><br>يعمل 24/7</div><div class="spec-card"><strong>🚀 محطة عمل</strong><br>للهندسة والجرافيك</div><div class="spec-card"><strong>📱 أجهزة ذكية</strong><br>هواتف وأجهزة لوحية</div><div class="spec-card"><strong>⚡ حواسيب عملاقة</strong><br>لمحاكاة المناخ والفضاء</div></div>` },
        { id: 6, title: "مجالات استخدام الحاسوب", badge: "الحاسوب في حياتنا", content: `<ul><li><strong>📚 التعليم:</strong> منصات إلكترونية، فصول افتراضية.</li><li><strong>💼 الأعمال:</strong> إدارة قواعد البيانات، التجارة الإلكترونية.</li><li><strong>🎮 الترفيه:</strong> ألعاب، أفلام، تصميم جرافيكي.</li><li><strong>📡 الاتصالات:</strong> إنترنت، بريد إلكتروني، وسائل تواصل.</li><li><strong>🔬 الطب والبحث:</strong> تشخيص بالذكاء الاصطناعي، جراحة روبوتية.</li></ul><div class='highlight'>الحاسوب أصبح ركيزة أساسية في الحياة العصرية.</div>` },
        { id: 7, title: "خطة التعلم", badge: "الختام", content: `<h3>📌 خلاصة الرحلة</h3><p>فهم مكونات الحاسوب وأنواعه هو المفتاح لاستثماره بكفاءة.</p><div class='spec-grid'><div class='spec-card'><strong>🎯 ابدأ بالأساسيات</strong><br>افهم التعريف والمكونات</div><div class='spec-card'><strong>🛠️ طبق عملياً</strong><br>جرّب تركيب الأجهزة</div><div class='spec-card'><strong>📈 واكب التطور</strong><br>تابع المستجدات التقنية</div><div class='spec-card'><strong>🎓 توسّع في التخصص</strong><br>برمجة، شبكات، أمن سيبراني</div></div><p style="text-align:center; margin-top:1rem;">💡 "الحاسوب هو الآلة الأكثر مرونة التي ابتكرها الإنسان"</p>` }
    ];

    let currentLesson = 0;
    const STORAGE_KEY = 'byteacademy_lesson';
    const saved = localStorage.getItem(STORAGE_KEY);
    if(saved && saved >= 0 && saved < lessons.length) currentLesson = parseInt(saved);

    function renderSidebar() {
        const container = document.getElementById('lessonsList');
        container.innerHTML = '';
        lessons.forEach((lesson, idx) => {
            const btn = document.createElement('button');
            btn.classList.add('lesson-btn');
            if(idx === currentLesson) btn.classList.add('active');
            btn.innerHTML = `<i class="fas fa-circle-play"></i> ${lesson.title} <span style="margin-right:auto; font-size:0.65rem;">${lesson.badge}</span>`;
            btn.addEventListener('click', () => {
                currentLesson = idx;
                localStorage.setItem(STORAGE_KEY, currentLesson);
                renderSidebar();
                renderContent();
                updateStats();
                if(window.innerWidth <= 768) {
                    document.getElementById('sidebar').classList.remove('open');
                    document.getElementById('overlay').classList.remove('active');
                }
            });
            container.appendChild(btn);
        });
    }

    function renderContent() {
        const lesson = lessons[currentLesson];
        document.getElementById('dynamicTitle').innerHTML = lesson.title;
        document.getElementById('dynamicBadge').innerHTML = lesson.badge;
        const contentDiv = document.getElementById('dynamicContent');
        contentDiv.style.opacity = '0';
        setTimeout(() => {
            contentDiv.innerHTML = lesson.content;
            contentDiv.style.transition = 'opacity 0.2s';
            contentDiv.style.opacity = '1';
        }, 50);
        updateStats();
    }

    function updateStats() {
        const percent = ((currentLesson + 1) / lessons.length) * 100;
        document.getElementById('miniProgress').style.width = `${percent}%`;
        document.getElementById('completedCounter').innerText = currentLesson + 1;
        document.getElementById('totalLessons').innerText = lessons.length;
    }

    document.getElementById('prevBtn').addEventListener('click', () => {
        if(currentLesson > 0) {
            currentLesson--;
            localStorage.setItem(STORAGE_KEY, currentLesson);
            renderSidebar();
            renderContent();
        }
    });
    document.getElementById('nextBtn').addEventListener('click', () => {
        if(currentLesson < lessons.length - 1) {
            currentLesson++;
            localStorage.setItem(STORAGE_KEY, currentLesson);
            renderSidebar();
            renderContent();
        } else {
            alert("🎉 تهانينا! أكملت جميع الدروس.");
        }
    });

    window.addEventListener('keydown', (e) => {
        if(e.key === 'ArrowLeft') document.getElementById('nextBtn').click();
        if(e.key === 'ArrowRight') document.getElementById('prevBtn').click();
    });

    // Dark mode
    const darkBtn = document.getElementById('darkModeBtn');
    darkBtn.addEventListener('click', () => {
        document.body.classList.toggle('dark');
        const icon = darkBtn.querySelector('i');
        const span = darkBtn.querySelector('span');
        if(document.body.classList.contains('dark')) {
            icon.className = 'fas fa-sun';
            span.innerText = 'فاتح';
            localStorage.setItem('darkMode', 'true');
        } else {
            icon.className = 'fas fa-moon';
            span.innerText = 'داكن';
            localStorage.setItem('darkMode', 'false');
        }
    });
    if(localStorage.getItem('darkMode') === 'true') {
        document.body.classList.add('dark');
        document.querySelector('#darkModeBtn i').className = 'fas fa-sun';
        document.querySelector('#darkModeBtn span').innerText = 'فاتح';
    }

    // Mobile menu
    const mobileBtn = document.getElementById('mobileMenuToggle');
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('overlay');
    mobileBtn.addEventListener('click', () => {
        sidebar.classList.toggle('open');
        overlay.classList.toggle('active');
    });
    overlay.addEventListener('click', () => {
        sidebar.classList.remove('open');
        overlay.classList.remove('active');
    });

    renderSidebar();
    renderContent();
    updateStats();
</script>
</body>
</html>
